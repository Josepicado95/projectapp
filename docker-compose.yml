services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: aventuras
      POSTGRES_PASSWORD: aventuras123
      POSTGRES_DB: aventuras
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  recommender:
    build: ./apps/recommender
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1

volumes:
  postgres_data:
